<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Explorer</title>

    <link
      rel="shortcut icon"
      href="./assets/icons/favicon.png"
      type="image/x-icon"
    />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-md">
      <div class="container mx-auto flex justify-between">
        <a class="text-2xl font-bold text-primary">Meal Explorer</a>
        <button id="random-meal-btn" class="btn btn-primary"
          >Random Meal</button
        >
      </div>
    </div>

    <!-- Hero Section -->
    <section class="py-12 bg-white shadow-sm">
      <div class="container mx-auto text-center">
        <h1 class="text-4xl font-bold mb-4">Discover Delicious Meals</h1>
        <p class="text-gray-500 mb-8"
          >Search for your favorite meals and explore detailed recipes</p
        >
        <div class="flex justify-center gap-3">
          <input
            id="search-input"
            type="text"
            placeholder="Search meals..."
            class="input input-bordered w-full max-w-md"
          />
          <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
      </div>
    </section>

    <!-- Meals Section -->
    <section class="py-12">
      <div class="container mx-auto px-4">
        <h2 class="text-2xl font-bold mb-8 text-center">Meals</h2>

        <!-- Loading -->
        <div id="loading-spinner" class="text-center hidden">
          <span class="loading loading-spinner loading-lg"></span>
        </div>

        <!-- Not Found -->
        <div id="not-found" class="text-center hidden">
          <p class="text-red-500 text-xl">No meals found</p>
        </div>

        <!-- Meals Container -->
        <div
          id="meals-container"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
        ></div>
      </div>
    </section>

    <!-- Modal -->
    <dialog id="my_modal_2" class="modal">
      <div class="modal-box max-w-2xl">
        <div id="modal-content">
          <!-- JS will inject meal details here -->
        </div>
        <form method="dialog" class="modal-backdrop">
          <button class="btn btn-outline mt-4">Close</button>
        </form>
      </div>
    </dialog>

    <!-- Footer -->
    <footer class="footer footer-center p-6 bg-base-200 text-base-content">
      <p>© 2026 Meal Explorer | Built with HTML, Tailwind & DaisyUI</p>
    </footer>

    <!-- <script src="./js/script.js"></script> -->
    <script src="./js/app.js"></script>
  </body>
</html>
